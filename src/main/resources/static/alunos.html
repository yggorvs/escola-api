<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alunos | EduSystem</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🎓</div>
      <div class="logo-text"><h1>EduSystem</h1><span>Gestão Escolar</span></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">Principal</div>
      <a href="index.html" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
      <div class="nav-section-title">Cadastros</div>
      <a href="alunos.html" class="nav-item active"><span class="nav-icon">🎒</span> Alunos</a>
      <a href="professores.html" class="nav-item"><span class="nav-icon">👨‍🏫</span> Professores</a>
      <a href="materias.html" class="nav-item"><span class="nav-icon">📚</span> Matérias</a>
      <a href="cursos.html" class="nav-item"><span class="nav-icon">🎯</span> Cursos</a>
      <a href="turmas.html" class="nav-item"><span class="nav-icon">🏫</span> Turmas</a>
      <div class="nav-section-title">Lançamentos</div>
      <a href="presencas.html" class="nav-item"><span class="nav-icon">✅</span> Presenças</a>
      <a href="desempenho.html" class="nav-item"><span class="nav-icon">📝</span> Desempenho</a>
    </nav>
  </aside>

  <div class="main-wrapper">
    <header class="topbar">
      <div>
        <div class="topbar-title">🎒 Alunos</div>
        <div class="topbar-subtitle">Gestão de alunos matriculados</div>
      </div>
      <button class="btn btn-primary" id="btn-novo" onclick="abrirModalNovo()">+ Novo Aluno</button>
    </header>

    <main class="content">
      <div class="card">
        <div class="search-bar">
          <div class="search-input-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" class="form-control" id="input-busca" placeholder="Buscar por nome...">
          </div>
          <select class="form-control" id="filtro-status" style="width:140px">
            <option value="">Todos</option>
            <option value="ativo">Ativos</option>
            <option value="inativo">Inativos</option>
          </select>
        </div>
        <div id="tabela-alunos"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </main>
  </div>

  <!-- MODAL CADASTRO -->
  <div class="modal-overlay" id="modal-aluno">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-titulo">Novo Aluno</div>
        <button class="modal-close" onclick="closeModal('modal-aluno')">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="aluno-id">
        <div class="form-row">
          <div class="form-group" style="grid-column:1/-1">
            <label class="form-label">Nome Completo *</label>
            <input type="text" class="form-control" id="aluno-nome" placeholder="Ex: João Silva">
          </div>
          <div class="form-group">
            <label class="form-label">Matrícula *</label>
            <input type="text" class="form-control" id="aluno-matricula" placeholder="Ex: 2024001">
          </div>
          <div class="form-group">
            <label class="form-label">Data de Nascimento</label>
            <input type="date" class="form-control" id="aluno-nascimento">
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="aluno-email" placeholder="email@exemplo.com">
          </div>
          <div class="form-group">
            <label class="form-label">Telefone</label>
            <input type="text" class="form-control" id="aluno-telefone" placeholder="(11) 99999-9999">
          </div>
          <div class="form-group" style="grid-column:1/-1">
            <label class="form-label">Endereço</label>
            <input type="text" class="form-control" id="aluno-endereco" placeholder="Rua, número, bairro...">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('modal-aluno')">Cancelar</button>
        <button class="btn btn-primary" id="btn-salvar" onclick="salvarAluno()">💾 Salvar</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="js/api.js"></script>
  <script src="js/alunos.js"></script>
</body>
</html>
